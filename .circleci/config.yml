version: 2.1

executors:
  default:
    docker:
      - image: cimg/node:22.14.0 # Actualizado a tu versión de confianza para OIDC
        environment:
          TZ: "America/Sao_Paulo"
    resource_class: small

#### Filters
filter-prd: &filter-prd
  branches:
    only: /main/
    ignore:
      - /.*/

filter-unstable: &filter-unstable
  branches:
    only: /unstable/
    ignore:
      - /.*/

##### Jobs
jobs:
  install_dependencies:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
            - v1-dependencies-
      - run:
          name: Install Dependencies
          command: npm ci
      - save_cache:
          key: v1-dependencies-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules

  check_style:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Check Code Style
          command: npm run check

  run_tests:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Run Unit Tests
          command: npm run test

  build:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Build Packages
          command: npm run build

  # --- JOBS DE PUBLICACIÓN CON OIDC ---

  publish-types:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish @tiendanube/nube-sdk-types using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/types --access public

  publish-ui:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish @tiendanube/nube-sdk-ui using OIDC
          command: |
            npm run build --workspace packages/ui
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/ui --access public

  publish-jsx:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish @tiendanube/nube-sdk-jsx using OIDC
          command: |
            npm run build
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/jsx --access public

  publish-create-nube-app:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish create-nube-app using OIDC
          command: |
            npm run build
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/create-nube-app --access public

  publish-snippet:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish @tiendanube/nube-sdk-snippet using OIDC
          command: |
            # Obtenemos el token dinámico
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            
            # CORRECCIÓN: Usamos el nombre del paquete (@tiendanube/nube-sdk-snippet)
            # Esto evita que npm falle si no encuentra la ruta exacta en la caché
            npx npm@11 publish --workspace @tiendanube/nube-sdk-snippet --access public

  publish-helper:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish @tiendanube/nube-sdk-helper using OIDC
          command: |
            npm run build --workspace packages/helper
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/helper --access public

  # --- CHROME WEB STORE (extensión NubeSDK DevTools) ---

  upload-devtools-draft:
    executor: default
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm ci
      - run:
          name: Build & zip NubeSDK DevTools extension
          command: npm run zip -w packages/nube-devtools
      - run:
          name: Resolve zip path
          command: |
            VERSION=$(node -p "require('./packages/nube-devtools/package.json').version")
            echo "export EXT_VERSION=${VERSION}" >> "$BASH_ENV"
            echo "export ZIP_PATH=packages/nube-devtools/package/NubeSDK-DevTools-${VERSION}.zip" >> "$BASH_ENV"
            source "$BASH_ENV"
            ls -la "$ZIP_PATH"
      - run:
          name: Upload draft to Chrome Web Store (sin publicar)
          command: |
            # Intercambiamos el refresh token por un access token de corta duración
            curl -sS -f -X POST https://oauth2.googleapis.com/token \
              -d "client_id=${CHROME_CLIENT_ID}" \
              -d "client_secret=${CHROME_CLIENT_SECRET}" \
              -d "refresh_token=${CHROME_REFRESH_TOKEN}" \
              -d "grant_type=refresh_token" -o token.json
            ACCESS_TOKEN=$(node -p "require('./token.json').access_token")
            # Subimos el zip como borrador (no se llama al endpoint /publish)
            curl -sS -f \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "x-goog-api-version: 2" \
              -X PUT \
              -T "${ZIP_PATH}" \
              "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}"
      - run:
          name: Create GitHub release with zip asset
          command: |
            curl -sS -f -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/releases" \
              -d "{\"tag_name\":\"${CIRCLE_TAG}\",\"name\":\"${CIRCLE_TAG}\",\"body\":\"NubeSDK DevTools ${EXT_VERSION}\"}" \
              -o release.json
            UPLOAD_URL=$(node -p "require('./release.json').upload_url.replace(/{.*}$/, '')")
            ZIP_NAME=$(basename "${ZIP_PATH}")
            curl -sS -f -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/zip" \
              --data-binary @"${ZIP_PATH}" \
              "${UPLOAD_URL}?name=${ZIP_NAME}"

  publish-devtools-store:
    executor: default
    steps:
      - run:
          name: Publish NubeSDK DevTools draft to Chrome Web Store
          command: |
            # Promueve a público el borrador ya subido por publish-devtools.
            # No vuelve a subir el zip: solo llama al endpoint /publish del item.
            curl -sS -f -X POST https://oauth2.googleapis.com/token \
              -d "client_id=${CHROME_CLIENT_ID}" \
              -d "client_secret=${CHROME_CLIENT_SECRET}" \
              -d "refresh_token=${CHROME_REFRESH_TOKEN}" \
              -d "grant_type=refresh_token" -o token.json
            ACCESS_TOKEN=$(node -p "require('./token.json').access_token")
            curl -sS -f \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "x-goog-api-version: 2" \
              -H "Content-Length: 0" \
              -X POST \
              "https://www.googleapis.com/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}/publish"

  # --- JOBS UNSTABLE (OIDC) ---

  publish-types-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/types
      - run:
          name: Publish @tiendanube/nube-sdk-types (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/types --access public --tag unstable

  publish-ui-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Build @tiendanube/nube-sdk-ui
          command: npm run build --workspace packages/ui
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/ui
      - run:
          name: Publish @tiendanube/nube-sdk-ui (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/ui --access public --tag unstable

  publish-jsx-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Build packages
          command: npm run build
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/jsx
      - run:
          name: Publish @tiendanube/nube-sdk-jsx (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/jsx --access public --tag unstable

  publish-create-nube-app-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Build packages
          command: npm run build
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/create-nube-app
      - run:
          name: Publish create-nube-app (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/create-nube-app --access public --tag unstable

  publish-snippet-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/snippet
      - run:
          name: Publish @tiendanube/nube-sdk-snippet (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/snippet --access public --tag unstable

  publish-helper-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Build @tiendanube/nube-sdk-helper
          command: npm run build --workspace packages/helper
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/helper
      - run:
          name: Publish @tiendanube/nube-sdk-helper (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/helper --access public --tag unstable

##### Workflows
workflows:
  version: 2
  build-and-publish:
    jobs:
      - install_dependencies:
          context: extensibility-context
      - check_style:
          context: extensibility-context
          requires: [install_dependencies]
      - run_tests:
          context: extensibility-context
          requires: [check_style]
      - build:
          context: extensibility-context
          requires: [run_tests]
      
      # --- PRODUCCIÓN ---
      - approval-publish-types:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-types:
          context: [npm_trusted]
          requires: [approval-publish-types]
          
      - approval-publish-ui:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-ui:
          context: [npm_trusted]
          requires: [approval-publish-ui]

      - approval-publish-jsx:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-jsx:
          context: [npm_trusted]
          requires: [approval-publish-jsx]

      - approval-publish-create-nube-app:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-create-nube-app:
          context: [npm_trusted]
          requires: [approval-publish-create-nube-app]

      - approval-publish-snippet:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-snippet:
          context: [npm_trusted]
          requires: [approval-publish-snippet]

      - approval-publish-helper:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-helper:
          context: [npm_trusted]
          requires: [approval-publish-helper]

      # --- CHROME WEB STORE (DevTools) ---
      # Se dispara al crear una tag nube-sdk-* (no por branch).
      # 1) upload-devtools-draft: sube el zip como borrador y crea la release en GitHub.
      # 2) approval: botón manual para promover el borrador a público.
      # 3) publish-devtools-store: llama al endpoint /publish (solo tras aprobación).
      # Secrets vienen de las Project Env Vars (CHROME_*, GITHUB_TOKEN), sin context.
      - upload-devtools-draft:
          filters:
            tags:
              only: /^nube-sdk-.*/
            branches:
              ignore: /.*/
      - approval-publish-devtools:
          type: approval
          requires: [upload-devtools-draft]
          filters:
            tags:
              only: /^nube-sdk-.*/
            branches:
              ignore: /.*/
      - publish-devtools-store:
          requires: [approval-publish-devtools]
          filters:
            tags:
              only: /^nube-sdk-.*/
            branches:
              ignore: /.*/

      # --- UNSTABLE ---
      - approval-publish-types-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-types-unstable:
          context: [npm_trusted]
          requires: [approval-publish-types-unstable]

      - approval-publish-ui-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-ui-unstable:
          context: [npm_trusted]
          requires: [approval-publish-ui-unstable]

      - approval-publish-jsx-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-jsx-unstable:
          context: [npm_trusted]
          requires: [approval-publish-jsx-unstable]

      - approval-publish-create-nube-app-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-create-nube-app-unstable:
          context: [npm_trusted]
          requires: [approval-publish-create-nube-app-unstable]

      - approval-publish-snippet-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-snippet-unstable:
          context: [npm_trusted]
          requires: [approval-publish-snippet-unstable]

      - approval-publish-helper-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-helper-unstable:
          context: [npm_trusted]
          requires: [approval-publish-helper-unstable]

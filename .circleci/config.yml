version: 2.1

executors:
  default:
    docker:
      - image: cimg/node:22.14.0 # Actualizado a tu versión de confianza para OIDC
        environment:
          TZ: "America/Sao_Paulo"
    resource_class: small

#### Filters
filter-prd: &filter-prd
  branches:
    only: /main/
    ignore:
      - /.*/

filter-unstable: &filter-unstable
  branches:
    only: /unstable/
    ignore:
      - /.*/

##### Jobs
jobs:
  install_dependencies:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
            - v1-dependencies-
      - run:
          name: Install Dependencies
          command: npm ci
      - save_cache:
          key: v1-dependencies-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules

  check_style:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Check Code Style
          command: npm run check

  run_tests:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Run Unit Tests
          command: npm run test

  build:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Build Packages
          command: npm run build

  # --- JOBS DE PUBLICACIÓN CON OIDC ---

  publish-types:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish @tiendanube/nube-sdk-types using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/types --access public

  publish-ui:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish @tiendanube/nube-sdk-ui using OIDC
          command: |
            npm run build --workspace packages/ui
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/ui --access public

  publish-jsx:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish @tiendanube/nube-sdk-jsx using OIDC
          command: |
            npm run build
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/jsx --access public

  publish-create-nube-app:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish create-nube-app using OIDC
          command: |
            npm run build
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/create-nube-app --access public

  publish-snippet:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Publish @tiendanube/nube-sdk-snippet using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/snippet --access public

  # --- JOBS UNSTABLE (OIDC) ---

  publish-types-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/types
      - run:
          name: Publish @tiendanube/nube-sdk-types (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/types --access public --tag unstable

  publish-ui-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Build @tiendanube/nube-sdk-ui
          command: npm run build --workspace packages/ui
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/ui
      - run:
          name: Publish @tiendanube/nube-sdk-ui (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/ui --access public --tag unstable

  publish-jsx-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Build packages
          command: npm run build
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/jsx
      - run:
          name: Publish @tiendanube/nube-sdk-jsx (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/jsx --access public --tag unstable

  publish-create-nube-app-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Build packages
          command: npm run build
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/create-nube-app
      - run:
          name: Publish create-nube-app (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/create-nube-app --access public --tag unstable

  publish-snippet-unstable:
    executor: default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package-lock.json" }}
      - run:
          name: Set unstable version
          command: |
            COMMIT_HASH=${CIRCLE_SHA1:0:7}
            npm version prerelease --preid=unstable.${COMMIT_HASH} --no-git-tag-version --workspace packages/snippet
      - run:
          name: Publish @tiendanube/nube-sdk-snippet (unstable) using OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx npm@11 publish --workspace packages/snippet --access public --tag unstable

##### Workflows
workflows:
  version: 2
  build-and-publish:
    jobs:
      - install_dependencies:
          context: extensibility-context
      - check_style:
          context: extensibility-context
          requires: [install_dependencies]
      - run_tests:
          context: extensibility-context
          requires: [check_style]
      - build:
          context: extensibility-context
          requires: [run_tests]
      
      # --- PRODUCCIÓN ---
      - approval-publish-types:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-types:
          context: [npm_trusted]
          requires: [approval-publish-types]
          
      - approval-publish-ui:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-ui:
          context: [npm_trusted]
          requires: [approval-publish-ui]

      - approval-publish-jsx:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-jsx:
          context: [npm_trusted]
          requires: [approval-publish-jsx]

      - approval-publish-create-nube-app:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-create-nube-app:
          context: [npm_trusted]
          requires: [approval-publish-create-nube-app]

      - approval-publish-snippet:
          type: approval
          requires: [build]
          filters: { <<: *filter-prd }
      - publish-snippet:
          context: [npm_trusted]
          requires: [approval-publish-snippet]

      # --- UNSTABLE ---
      - approval-publish-types-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-types-unstable:
          context: [npm_trusted]
          requires: [approval-publish-types-unstable]

      - approval-publish-ui-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-ui-unstable:
          context: [npm_trusted]
          requires: [approval-publish-ui-unstable]

      - approval-publish-jsx-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-jsx-unstable:
          context: [npm_trusted]
          requires: [approval-publish-jsx-unstable]

      - approval-publish-create-nube-app-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-create-nube-app-unstable:
          context: [npm_trusted]
          requires: [approval-publish-create-nube-app-unstable]

      - approval-publish-snippet-unstable:
          type: approval
          requires: [build]
          filters: { <<: *filter-unstable }
      - publish-snippet-unstable:
          context: [npm_trusted]
          requires: [approval-publish-snippet-unstable]

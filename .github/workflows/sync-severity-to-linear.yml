name: Sync Severity to Linear Priority

on:
  issues:
    types: [opened]

permissions:
  issues: read

jobs:
  sync-priority:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'bug')
    steps:
      - uses: actions/github-script@v7
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issueTitle = context.payload.issue.title;
            const issueNumber = context.payload.issue.number;

            const severityMap = {
              'Urgent': 1,
              'High': 2,
              'Medium': 3,
              'Low': 4,
            };

            let priority = null;
            for (const [key, value] of Object.entries(severityMap)) {
              if (body.includes(`${key} -`)) {
                priority = value;
                break;
              }
            }

            if (!priority) {
              core.info('No severity selected, skipping priority sync.');
              return;
            }

            core.info(`Severity detected: priority level ${priority}`);
            core.info(`Looking for Linear issue with title: "${issueTitle}"`);

            const linearApiKey = process.env.LINEAR_API_KEY;
            const linearTeamId = process.env.LINEAR_TEAM_ID;

            if (!linearApiKey || !linearTeamId) {
              core.setFailed('LINEAR_API_KEY or LINEAR_TEAM_ID secret is not configured.');
              return;
            }

            async function queryLinear(query, variables = {}) {
              const response = await fetch('https://api.linear.app/graphql', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': linearApiKey,
                },
                body: JSON.stringify({ query, variables }),
              });
              return response.json();
            }

            const maxAttempts = 6;
            const delayMs = 15000;
            let linearIssueId = null;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              core.info(`Attempt ${attempt}/${maxAttempts}: searching for issue in Linear...`);

              const searchQuery = `
                query($teamId: ID!, $title: String!) {
                  issues(
                    filter: {
                      team: { id: { eq: $teamId } }
                      title: { containsIgnoreCase: $title }
                    }
                    orderBy: createdAt
                    last: 5
                  ) {
                    nodes {
                      id
                      identifier
                      title
                      createdAt
                    }
                  }
                }
              `;

              const data = await queryLinear(searchQuery, {
                teamId: linearTeamId,
                title: issueTitle,
              });

              if (data.errors) {
                core.warning(`Linear API error: ${JSON.stringify(data.errors)}`);
              }

              const nodes = data.data?.issues?.nodes || [];

              if (nodes.length > 0) {
                linearIssueId = nodes[0].id;
                core.info(`Found Linear issue: ${nodes[0].identifier} - "${nodes[0].title}" (${linearIssueId})`);
                break;
              }

              if (attempt < maxAttempts) {
                core.info(`Issue not found in Linear yet, waiting ${delayMs / 1000}s...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            if (!linearIssueId) {
              core.warning(`Could not find Linear issue matching title "${issueTitle}" after ${maxAttempts} attempts. The team may need to set priority manually.`);
              return;
            }

            const updateQuery = `
              mutation($issueId: ID!, $priority: Int!) {
                issueUpdate(id: $issueId, input: { priority: $priority }) {
                  success
                  issue {
                    identifier
                    priority
                  }
                }
              }
            `;

            const updateData = await queryLinear(updateQuery, {
              issueId: linearIssueId,
              priority: priority,
            });

            if (updateData.data?.issueUpdate?.success) {
              core.info(`Priority updated to ${priority} for ${updateData.data.issueUpdate.issue.identifier}`);
            } else {
              core.setFailed(`Failed to update priority: ${JSON.stringify(updateData)}`);
            }

name: Stale Issues

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this issue is still relevant, please leave a comment to keep it open.
            Thank you for your contributions!
          close-issue-message: >
            This issue has been automatically closed due to inactivity. If you believe
            this is still relevant, feel free to reopen it or create a new issue.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          exempt-issue-labels: "status:in-progress,priority:urgent"
          operations-per-run: 30

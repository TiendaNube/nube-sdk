name: Architecture Auto Reply

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = (context.payload.issue.title || '').toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = `${title} ${body}`;

            const keywords = [
              'dom access', 'direct dom', 'document.queryselector', 'getelementbyid',
              'innerhtml', 'outerhtml', 'document.write', 'script injection',
              'inject script', 'external script', 'load script', 'localstorage',
              'sessionstorage', 'cookie', 'window.location', 'window.document',
              'manipulate dom', 'dom manipulation'
            ];

            const matched = keywords.some(kw => text.includes(kw));

            if (!matched) {
              core.info('No architecture keywords detected. Skipping.');
              return;
            }

            core.info('Architecture keywords detected. Adding label and comment.');

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'architecture-constraint',
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'architecture-constraint',
                color: 'd93f0b',
                description: 'Request involves Web Worker architecture limitations (DOM, scripts, localStorage)',
              });
              core.info('Created label: architecture-constraint');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['architecture-constraint'],
            });

            const comment = `Hi! Thanks for opening this request.

            We understand the need for capabilities like direct DOM access or script injection, many developers have asked for similar functionality.

            NubeSDK apps run inside Web Workers by design, which provides security and stability benefits but also means some browser APIs aren't directly available.
            **We're actively exploring the best ways to support these use cases** within the SDK.

            In the meantime, here are some alternatives that might help:
            - **UI rendering** -- Use [Slots](https://dev.tiendanube.com/docs/applications/nube-sdk/slots/overview) + [Components](https://dev.tiendanube.com/docs/applications/nube-sdk/components/overview)
            - **Data storage** -- Use [Browser APIs](https://dev.tiendanube.com/docs/applications/nube-sdk/browser-apis) (async storage with TTL)
            - **External content** -- Use [iframe support](https://dev.tiendanube.com/docs/applications/nube-sdk/browser-apis)

            For more context on this architecture decision, see [this discussion](https://github.com/TiendaNube/nube-sdk/discussions/227).

            We're keeping this issue open to track demand. Your input helps us prioritize.

            best,

            Extensibility Team`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment.replace(/^            /gm, ''),
            });

            core.info('Posted architecture auto-reply comment.');

name: Welcome New Contributors

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Welcome to NubeSDK! 👋 Thank you for opening your first issue.


            Our team will review this soon. In the meantime:

            - 📖 Check our [Contributing Guide](https://github.com/TiendaNube/nube-sdk/blob/main/CONTRIBUTING.md)

            - 📚 Browse the [NubeSDK Documentation](https://dev.tiendanube.com/docs/applications/nube-sdk/overview)

            - 💬 For questions, use [Discussions Q&A](https://github.com/TiendaNube/nube-sdk/discussions/categories/q-a)

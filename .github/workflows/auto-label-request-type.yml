name: Auto Label Request Type

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'Partner Request')
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            const typeMap = {
              'Slot': 'request:slot',
              'Component': 'request:component',
              'Event': 'request:event',
              'Other': 'request:other',
            };

            for (const [value, label] of Object.entries(typeMap)) {
              const pattern = new RegExp(`### Request Type\\s*\\n\\s*${value}`, 'i');
              if (pattern.test(body)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [label],
                });
                core.info(`Applied label: ${label}`);
                break;
              }
            }

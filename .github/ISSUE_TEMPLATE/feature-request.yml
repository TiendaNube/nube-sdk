name: Feature Request
description: Suggest a new feature or improvement for NubeSDK
title: "[REQUEST] "
labels: ["Partner Request"]
body:
  - type: checkboxes
    id: architecture-check
    attributes:
      label: "⚠️ Architecture Notice"
      description: "NubeSDK apps run in **Web Workers** — direct DOM access and script injection are **not supported by design**. [Learn more](https://dev.tiendanube.com/docs/applications/nube-sdk/overview) · [Discussions Q&A](https://github.com/TiendaNube/nube-sdk/discussions/categories/q-a)"
      options:
        - label: "My request does NOT require direct DOM access or script injection."
          required: true

  - type: input
    id: app-id
    attributes:
      label: App ID
      description: Your application ID, if you already have one.
      placeholder: "e.g. 12345"

  - type: input
    id: app-name
    attributes:
      label: App name
      description: Your application name (optional).
      placeholder: "e.g. My Payments App"

  - type: dropdown
    id: request-type
    attributes:
      label: Request Type
      description: What type of request is this?
      options:
        - Slot
        - Component
        - Event
        - Other
    validations:
      required: true

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: Tell us what you'd like to see in NubeSDK.
      value: |
        **What problem does this solve?**


        **Proposed solution**


        **Use case (optional)**


        **Alternatives considered (optional)**

    validations:
      required: true

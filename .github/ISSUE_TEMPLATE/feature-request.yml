name: Feature Request
description: Suggest a new feature or improvement for NubeSDK
title: "[REQUEST] "
labels: ["Partner Request"]
body:
  - type: input
    id: app-id
    attributes:
      label: App ID
      description: Your application ID, if you already have one.
      placeholder: "e.g. 12345"

  - type: input
    id: app-name
    attributes:
      label: App name
      description: Your application name (optional).
      placeholder: "e.g. My Payments App"

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: Tell us what you'd like to see in NubeSDK.
      value: |
        **What problem does this solve?**


        **Proposed solution**


        **Use case (optional)**


        **Alternatives considered (optional)**

    validations:
      required: true

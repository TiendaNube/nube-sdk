name: Bug Report
description: Report a bug in NubeSDK
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: Tell us what happened. The more detail you provide, the faster we can help.
      placeholder: |
        **What happened?**
        Describe the bug clearly.

        **Steps to reproduce**
        1. ...
        2. ...
        3. ...

        **Expected behavior**
        What did you expect to happen?

        **Environment (optional)**
        NubeSDK version, browser, OS, etc.

        **Logs or screenshots (optional)**
        Paste any relevant error messages or attach screenshots.
    validations:
      required: true
